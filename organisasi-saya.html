<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

:root{
  --ink:#0f2419; --green:#0d5c3f; --green2:#10744f; --leaf:#1f9d6b;
  --gold:#c79a3a; --rust:#c0492f; --amber:#d9892b;
  --paper:#f4f1e9; --card:#ffffff; --line:#e3ded2; --muted:#6b7468;
  --shadow:0 1px 2px rgba(15,36,25,.06),0 8px 24px rgba(15,36,25,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background-image:radial-gradient(circle at 12% 0%,rgba(31,157,107,.07),transparent 38%),radial-gradient(circle at 100% 8%,rgba(199,154,58,.06),transparent 40%);
  background-attachment:fixed;}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 120px}

/* Header */
header{padding:22px 4px 14px}
.brand{display:flex;align-items:center;gap:10px}
.dot{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--green2),var(--ink));
  display:grid;place-items:center;color:#eFe7cf;font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;box-shadow:var(--shadow)}
h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:25px;margin:0;letter-spacing:-.02em;line-height:1}
.sub{color:var(--muted);font-size:12.5px;margin-top:3px}

/* stat row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 10px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative;overflow:hidden;text-align:center}
.stat:active{transform:scale(.97)}
.stat .n{font-family:'Bricolage Grotesque';font-weight:800;font-size:23px;line-height:1}
.stat .l{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.01em}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.stat.s-all::before{background:var(--ink)} .stat.s-all .n{color:var(--ink)}
.stat.s-act::before{background:var(--leaf)} .stat.s-act .n{color:var(--green)}
.stat.s-exp::before{background:var(--rust)} .stat.s-exp .n{color:var(--rust)}
.stat.s-soon::before{background:var(--amber)} .stat.s-soon .n{color:var(--amber)}
.stat.s-in::before{background:#8a93a6} .stat.s-in .n{color:#5a6475}
.stat.on{outline:2px solid var(--ink);outline-offset:1px}

/* controls */
.controls{margin-top:16px;display:flex;flex-direction:column;gap:9px}
.search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;box-shadow:var(--shadow)}
.search svg{flex:none}
.search input{border:0;outline:0;font:inherit;font-size:15px;width:100%;background:transparent;color:var(--ink)}

.selrow{display:flex;gap:7px}
select{flex:1;font:inherit;font-size:12px;font-weight:600;padding:8px 6px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);box-shadow:var(--shadow);min-width:0;text-align:center}

.countbar{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 9px}
.countbar .c{font-size:12.5px;color:var(--muted);font-weight:600}
.sortbtn{font-size:12.5px;font-weight:700;color:var(--green);background:none;border:0;cursor:pointer}

/* cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.b-act{background:var(--leaf)} .b-exp{background:var(--rust)} .b-soon{background:var(--amber)} .b-in{background:#8a93a6}
.crow{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.nm{font-weight:700;font-size:15.5px;line-height:1.25;letter-spacing:-.01em}
.meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 9px;font-weight:500}
.meta b{color:var(--ink);font-weight:700}
.rank{flex:none;font-family:'Bricolage Grotesque';font-weight:700;font-size:11px;padding:4px 9px;border-radius:8px;letter-spacing:.03em;background:#eef3ee;color:var(--green)}
.rank.hi{background:#1c3a2a;color:#dff0e3}
.exp-label-act{color:var(--muted);font-weight:500}
.exp-label-act b{color:var(--ink)}
.exp-label-exp{color:var(--rust);font-weight:700}
.exp-label-exp b{color:var(--rust)}
.exp-label-soon{color:var(--amber);font-weight:700}
.exp-label-soon b{color:var(--amber)}
.exp-label-in{color:var(--muted);font-weight:500}
.exp-label-in b{color:var(--ink)}
.branch{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:11.5px;font-weight:700;color:#7a5a10;background:#fdf3dc;border:1px solid #f0d98a;padding:5px 10px;border-radius:8px;max-width:100%}
.branch svg{flex:none}
.branch span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notebtn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:#f5f5f0;border:1px solid #e0ddd4;color:#5a6475;
  font:inherit;font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:10px;cursor:pointer;width:100%;text-align:left}
.notebtn:active{transform:scale(.98)}
.notebtn.has-note{background:#fff8e6;border-color:#f0d98a;color:#7a5a10}
/* modal nota */
.ntarea{width:100%;min-height:90px;font:inherit;font-size:14px;padding:12px;border:1px solid var(--line);border-radius:12px;resize:vertical;outline:none;color:var(--ink);background:#fafaf7;margin-bottom:10px}
.ntarea:focus{border-color:var(--gold);background:#fff}
.ntadd{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
.ntadd textarea{flex:1}
.ntadd .addbtn{flex:none;padding:10px 14px;background:var(--green);color:#fff;border:0;border-radius:11px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;align-self:flex-end}
/* history log */
.ntlog{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;margin-bottom:4px;padding-right:2px}
.ntentry{background:#fafaf7;border:1px solid var(--line);border-radius:11px;padding:10px 12px;position:relative}
.ntentry .nttxt{font-size:13.5px;line-height:1.5;color:var(--ink);white-space:pre-wrap;word-break:break-word;padding-right:28px}
.ntentry .ntts{font-size:11px;color:var(--muted);font-weight:600;margin-top:5px}
.ntentry .ntdel{position:absolute;top:8px;right:8px;background:none;border:0;color:#ccc;cursor:pointer;font-size:16px;padding:2px 5px;border-radius:6px}
.ntentry .ntdel:hover{color:var(--rust);background:#fae8e3}
.ntempty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;font-weight:600}
.uplinebtn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:#f1f5f1;border:1px solid #d8e6dc;color:var(--green);
  font:inherit;font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:10px;cursor:pointer;max-width:100%;text-align:left}
.uplinebtn:active{transform:scale(.98)}
.uplinebtn .lbl{color:var(--muted);font-weight:600;flex:none}
.uplinebtn .un{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vol{display:flex;gap:14px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.vol div{font-size:11px;color:var(--muted);font-weight:600}
.vol b{display:block;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:var(--ink);margin-top:1px}
.acts{display:flex;gap:8px;margin-top:13px}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:11px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;border:1px solid transparent;text-decoration:none}
.btn:active{transform:scale(.98)}
.btn-call{background:#eef3ee;color:var(--green);border-color:#d8e6dc}
.btn-wa{background:var(--green);color:#fff}
.btn:disabled,.btn.dis{opacity:.4;pointer-events:none}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-weight:600}

/* upload bar */
.uprow{position:fixed;left:0;right:0;bottom:0;background:rgba(244,241,233,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:11px 14px;z-index:30}
.uprow .in{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:center}
.uplabel{flex:1;font-size:12px;color:var(--muted);font-weight:600;line-height:1.3}
.upbtn{flex:none;display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#f4f1e9;font:inherit;font-weight:700;font-size:13.5px;padding:11px 16px;border-radius:12px;border:0;cursor:pointer}
.upbtn:active{transform:scale(.97)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(15,36,25,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
.modal.show{display:flex}
.sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));animation:up .25s;display:flex;flex-direction:column;max-height:88vh}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet h3{font-family:'Bricolage Grotesque';font-weight:800;margin:0 0 3px;font-size:18px}
.sheet p{margin:0 0 12px;font-size:12.5px;color:var(--muted)}
.tmpl{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;cursor:pointer;font-size:13px;line-height:1.45;transition:.15s}
.tmpl:active{transform:scale(.99)} .tmpl.on{border-color:var(--green);background:#f3f8f4}
.tmpl .t{font-weight:700;margin-bottom:3px;font-size:12px;color:var(--green)}
.sheetacts{display:flex;gap:8px;margin-top:6px}
.gbtn{flex:1;padding:13px;border-radius:12px;font:inherit;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff}
.gbtn.prim{background:var(--green);color:#fff;border-color:var(--green)}

/* upline chain rows */
.uline{display:flex;flex-direction:column;gap:8px;margin:4px 0 14px;max-height:60vh;overflow-y:auto}
.urow{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:13px;background:#fff;position:relative}
.urow.self{background:#f3f8f4;border-color:#cfe3d6}
.ustep{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;background:#eef3ee;color:var(--green)}
.urow.self .ustep{background:var(--green);color:#fff}
.uinfo{flex:1;min-width:0}
.uinfo .un2{font-weight:700;font-size:14px;line-height:1.2;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uinfo .um{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.umini{display:flex;gap:6px;flex:none}
.umini a,.umini button{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--green);text-decoration:none}
.umini button{background:var(--green);color:#fff;border-color:var(--green)}
.umini a.dis{opacity:.35;pointer-events:none}
.uarrow{text-align:center;color:var(--muted);font-size:14px;line-height:0;margin:-3px 0}
</style>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="dot">N</div>
      <div>
        <h1>Organisasi Saya</h1>
        <div class="sub" id="sub">Memuatkan data…</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="controls">
      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6b7468" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="q" placeholder="Cari nama atau SID…">
      </div>
      <div class="selrow">
        <select id="fLevel"></select>
        <select id="fState"></select>
        <select id="fRank"></select>
        <select id="fBranch"></select>
      </div>
    </div>
  </header>

  <div class="countbar">
    <div class="c" id="count"></div>
    <button class="sortbtn" id="sortbtn">Susun: Expiry ↑</button>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="uprow">
  <div class="in">
    <div class="uplabel">Data dari fail Excel Business Center. Upload export terbaru tiap bulan untuk kemas kini.</div>
    <button class="upbtn" id="upbtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f4f1e9" stroke-width="2.2"><path d="M12 16V4m0 0 4 4m-4-4-4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Upload
    </button>
    <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
  </div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="mTitle">Hantar WhatsApp</h3>
    <p id="mSub"></p>
    <div id="tmpls"></div>
    <div class="sheetacts">
      <button class="gbtn" id="mCancel">Batal</button>
      <button class="gbtn prim" id="mSend">Buka WhatsApp</button>
    </div>
  </div>
</div>

<div class="modal" id="noteModal">
  <div class="sheet">
    <h3>📝 Log Aktiviti</h3>
    <p id="noteSub" style="margin-bottom:12px;font-weight:600"></p>
    <div class="ntadd">
      <textarea class="ntarea" id="noteArea" placeholder="Contoh: Dah call, bgtau promo Jun. Dia nak fikir dulu…" rows="3"></textarea>
    </div>
    <button class="gbtn prim" id="noteSave" style="width:100%;margin-bottom:12px">+ Tambah Rekod</button>
    <div style="font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.04em">REKOD LEPAS</div>
    <div class="ntlog" id="noteLog"></div>
    <div class="sheetacts" style="margin-top:8px">
      <button class="gbtn prim" id="noteCancel" style="background:var(--ink);border-color:var(--ink)">Tutup</button>
    </div>
  </div>
</div>

<div class="modal" id="upModal">
  <div class="sheet">
    <h3>Rantaian Upline</h3>
    <p id="upSub"></p>
    <div class="uline" id="upChain"></div>
    <div class="sheetacts">
      <button class="gbtn prim" id="upClose">Tutup</button>
    </div>
  </div>
</div>

  const dt=daysTo(p.expiry);
  if(dt!==null && dt>=0 && dt<=60) return 'soon';
  if(p.status==='Active' && p.puv===0) return 'in';
  return 'act';
}
function fmtDate(d){ if(!d)return'—'; const m=["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogo","Sep","Okt","Nov","Dis"]; const x=new Date(d+'T00:00:00'); return x.getDate()+" "+m[x.getMonth()]+" "+x.getFullYear(); }
function cleanPhone(p){ return (p||'').replace(/[^0-9]/g,'').replace(/^0/,'60'); }

// Kira upline dan L1 ancestor (cawangan)
function computeUplines(arr){
  // Pass 1: kira upline terus
  for(let i=0;i<arr.length;i++){
    arr[i]._i=i; arr[i]._up=-1;
    const lv=arr[i].lvl;
    for(let j=i-1;j>=0;j--){ if(arr[j].lvl===lv-1){ arr[i]._up=j; break; } }
  }
  // Pass 2: kira L1 ancestor (cawangan direct Salmah)
  for(let i=0;i<arr.length;i++){
    const lv=arr[i].lvl;
    if(lv===0){ arr[i]._l1=-1; continue; }
    if(lv===1){ arr[i]._l1=i; continue; }
    let cur=i, guard=0, found=-1;
    while(guard<30){
      const up=arr[cur]._up;
      if(up<0) break;
      if(arr[up].lvl===1){ found=up; break; }
      cur=up; guard++;
    }
    arr[i]._l1=found;
  }
}

function compute(){
  let act=0,exp=0,soon=0,inact=0;
  DATA.forEach(p=>{const s=statusOf(p); if(s==='exp')exp++; else if(s==='soon')soon++; else if(s==='in')inact++; else act++;});
  return {act,exp,soon,inact};
}

function renderStats(){
  const c=compute();
  document.getElementById('stats').innerHTML=`
    <div class="stat s-all ${filter.cat==='all'?'on':''}" data-c="all"><div class="n">${DATA.length}</div><div class="l">Semua</div></div>
    <div class="stat s-act ${filter.cat==='act'?'on':''}" data-c="act"><div class="n">${c.act}</div><div class="l">Aktif</div></div>
    <div class="stat s-soon ${filter.cat==='soon'?'on':''}" data-c="soon"><div class="n">${c.soon}</div><div class="l">Nak Expire</div></div>
    <div class="stat s-exp ${filter.cat==='exp'?'on':''}" data-c="exp"><div class="n">${c.exp}</div><div class="l">Expired</div></div>`;
  document.querySelectorAll('.stat').forEach(el=>el.onclick=()=>{ filter.cat = filter.cat===el.dataset.c?'all':el.dataset.c; renderAll(); });
}

function fillSelects(){
  const lv=[...new Set(DATA.map(p=>p.lvl))].sort((a,b)=>a-b);
  const st=[...new Set(DATA.map(p=>p.state).filter(Boolean))].sort();
  const rk=[...new Set(DATA.map(p=>p.erank).filter(Boolean))].sort();
  document.getElementById('fLevel').innerHTML='<option value="">Level</option>'+lv.map(l=>`<option value="${l}">Level ${l}</option>`).join('');
  document.getElementById('fState').innerHTML='<option value="">Negeri</option>'+st.map(s=>`<option value="${s}">${STATE_MAP[s]||s}</option>`).join('');
  document.getElementById('fRank').innerHTML='<option value="">Rank</option>'+rk.map(r=>`<option value="${r}">${r}</option>`).join('');
  // Cawangan L1
  const l1s=DATA.filter(p=>p.lvl===1).map(p=>({sid:p.sid,name:p.name}));
  document.getElementById('fBranch').innerHTML='<option value="">Leader</option>'+l1s.map(p=>`<option value="${p.sid}">${p.name.split(' ').slice(0,3).join(' ')}</option>`).join('');
}



function getFiltered(){
  let r=DATA.filter(p=>{
    if(filter.cat!=='all' && statusOf(p)!==filter.cat) return false;
    if(filter.lvl!=='' && String(p.lvl)!==filter.lvl) return false;
    if(filter.state && p.state!==filter.state) return false;
    if(filter.rank && p.erank!==filter.rank) return false;
    if(filter.branch){ const l1=p._l1>=0?DATA[p._l1]:null; if(!l1 || l1.sid!==filter.branch) return false; }
    if(filter.q){ const q=filter.q.toLowerCase(); if(!p.name.toLowerCase().includes(q) && !String(p.sid).includes(q)) return false; }
    return true;
  });
  r.sort((a,b)=>{
    if(sortKey==='expiry'){ const da=daysTo(a.expiry)??99999, db=daysTo(b.expiry)??99999; return da-db; }
    if(sortKey==='guv') return b.guv-a.guv;
    return a.name.localeCompare(b.name);
  });
  return r;
}

  else if(s==='in'){pill='p-in';ptxt='Tiada PV bulan ini';}
  else {pill='p-act';ptxt='Aktif';}
  const hasPhone=cleanPhone(p.phone).length>=8;

      </div>
      <span class="rank ${hi}">${p.erank||'—'}</span>
    </div>

    ${branchTag}
    ${uplineBtn}
    ${noteTag}

      <div>PUV<b>${p.puv}</b></div><div>GUV<b>${p.guv}</b></div><div>PPV<b>${p.ppv}</b></div><div>GPV<b>${p.gpv}</b></div>
    </div>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
        Call</a>
      <button class="btn btn-wa ${hasPhone?'':'dis'}" data-sid="${p.sid}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.3.3c-.1.1-.3.3-.1.5.1.3.6 1 1.3 1.6.9.8 1.6 1 1.9 1.2.2.1.4.1.5-.1l.7-.8c.2-.2.3-.2.5-.1l1.8.9c.2.1.4.2.4.3.1.1.1.5-.1 1.1Z"/></svg>
        WhatsApp</button>

}

function renderList(){
  const r=getFiltered();
  document.getElementById('count').textContent=r.length+' orang';
  document.getElementById('list').innerHTML = r.length? r.map(card).join('') : '<div class="empty">Tiada rekod sepadan.<br>Cuba tukar penapis.</div>';

/* Log Aktiviti modal */

function fmtNow(){
  return new Date().toLocaleString('ms-MY',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function loadLog(sid){ return JSON.parse(localStorage.getItem('notelog_'+sid)||'[]'); }
function saveLog(sid,arr){ localStorage.setItem('notelog_'+sid,JSON.stringify(arr)); }

function renderLog(sid){
  const log=loadLog(sid);

  if(!log.length){ el.innerHTML='<div class="ntempty">Belum ada rekod aktiviti.<br>Tambah rekod pertama di atas.</div>'; return; }
  el.innerHTML=log.slice().reverse().map((e,ri)=>{

document.getElementById('noteSave').onclick=()=>{
  const txt=document.getElementById('noteArea').value.trim();
  if(!txt){ document.getElementById('noteArea').focus(); return; }
  const arr=loadLog(noteTarget);
  arr.push({text:txt, ts:fmtNow()});
  saveLog(noteTarget,arr);
  document.getElementById('noteArea').value='';
  renderLog(noteTarget);
  renderList();
};

/* Upline chain modal */
function openUpline(startIdx){
  const person=DATA[startIdx];
  // bina rantaian: orang ini -> upline -> upline ... -> root
  const chain=[]; let i=startIdx, guard=0;
  while(i>=0 && guard<30){ chain.push(DATA[i]); i=DATA[i]._up; guard++; }
  chain.reverse();
  document.getElementById('upSub').textContent='Dari '+(person.name||'')+' naik ke atas';
  const rows=chain.map((p,k)=>{
    const self=k===chain.length-1?'self':'';
    const ph=(p.phone||'').replace(/[^0-9+]/g,''); const hasPhone=cleanPhone(p.phone).length>=8;
    const arrow=k<chain.length-1?'<div class="uarrow">↓</div>':'';
    const label=k===chain.length-1?'Ahli ini':(k===chain.length-2?'Upline terus':'Lvl '+p.lvl);
    return `<div class="urow ${self}">
        <div class="ustep">L${p.lvl}</div>
        <div class="uinfo"><div class="un2">${p.name||'—'}</div><div class="um">${label} · ${p.erank||'—'} · SID ${p.sid}</div></div>
        <div class="umini">
          <a class="${hasPhone?'':'dis'}" href="tel:${ph}" title="Call"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg></a>
          <button class="${hasPhone?'':'dis'}" data-wa="${p.sid}" title="WhatsApp"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.3.3c-.1.1-.3.3-.1.5.1.3.6 1 1.3 1.6.9.8 1.6 1 1.9 1.2.2.1.4.1.5-.1l.7-.8c.2-.2.3-.2.5-.1l1.8.9c.2.1.4.2.4.3.1.1.1.5-.1 1.1Z"/></svg></button>
        </div>
      </div>${arrow}`;
  }).join('');
  document.getElementById('upChain').innerHTML=rows;
  document.querySelectorAll('#upChain [data-wa]').forEach(b=>b.onclick=()=>{ document.getElementById('upModal').classList.remove('show'); openWa(b.dataset.wa); });
  document.getElementById('upModal').classList.add('show');
}

/* upload */
document.getElementById('upbtn').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
      const hdr=rows.findIndex(r=>r&&r.join('|').toLowerCase().includes('name'));
      const H=rows[hdr].map(x=>String(x).trim().toLowerCase());
      const col=n=>H.findIndex(h=>h.includes(n));
      const ci={lvl:col('level'),status:col('status'),sid:col('dist'),name:col('name'),entry:col('entry'),erank:col('eff'),arank:col('app'),phone:col('phone'),state:col('state'),puv:col('puv'),guv:col('guv'),ppv:col('ppv'),gpv:col('gpv'),nuv:col('nuv'),expiry:col('expiry')};
      const out=[];
      for(let i=hdr+1;i<rows.length;i++){
        const r=rows[i]; if(!r||!r[ci.status])continue;
        const st=String(r[ci.status]).trim(); if(!['Active','Expired','Pre-active'].includes(st))continue;
        const dnorm=v=>{ if(!v)return''; const d=new Date(v); return isNaN(d)?String(v).slice(0,10):d.toISOString().slice(0,10); };
        out.push({lvl:parseInt(r[ci.lvl])||0,status:st,sid:String(r[ci.sid]||'').replace('.0',''),name:String(r[ci.name]||'').trim(),
          entry:dnorm(r[ci.entry]),erank:String(r[ci.erank]||'').trim(),arank:String(r[ci.arank]||'').trim(),phone:String(r[ci.phone]||'').trim(),
          state:String(r[ci.state]||'').trim(),puv:+r[ci.puv]||0,guv:+r[ci.guv]||0,ppv:+r[ci.ppv]||0,gpv:+r[ci.gpv]||0,nuv:+r[ci.nuv]||0,expiry:dnorm(r[ci.expiry])});
      }
      if(out.length){ DATA=out; computeUplines(DATA); document.getElementById('sub').textContent=out.length+' ahli · dikemas kini '+new Date().toLocaleDateString('ms-MY'); fillSelects(); renderAll(); }
      else alert('Tak jumpa data sah dalam fail. Pastikan ini fail export "My Organisation" dari Business Center.');
    }catch(err){ alert('Gagal baca fail: '+err.message); }
  };
  rd.readAsArrayBuffer(f);
};

/* init */
document.getElementById('sub').textContent=DATA.length+' ahli organisasi · setakat hari ini';
computeUplines(DATA);
fillSelects(); renderAll();
</script>
